services:
  postgres:
    image: postgres:16-bookworm
    container_name: voting-postgres
    restart: unless-stopped
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: voting-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: voting-auth
    restart: unless-stopped
    environment:
      PORT: ${AUTH_PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: ${RUST_LOG}
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AUTH_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  election-service:
    build:
      context: ./backend
      dockerfile: election-service/Dockerfile
    container_name: voting-election
    restart: unless-stopped
    environment:
      PORT: ${ELECTION_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: ${RUST_LOG}
    ports:
      - "${ELECTION_PORT}:${ELECTION_PORT}"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${ELECTION_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  vote-service:
    build:
      context: ./backend
      dockerfile: vote-service/Dockerfile
    container_name: voting-vote
    restart: unless-stopped
    environment:
      PORT: ${VOTE_PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: ${RUST_LOG}
    ports:
      - "${VOTE_PORT}:${VOTE_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${VOTE_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
