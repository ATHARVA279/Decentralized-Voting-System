services:
  redis:
    image: redis:7-alpine
    container_name: voting-redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: voting-auth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${AUTH_PORT:-3001}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${AUTH_PORT:-3001}:${AUTH_PORT:-3001}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${AUTH_PORT:-3001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  election-service:
    build:
      context: ./backend
      dockerfile: election-service/Dockerfile
    container_name: voting-election
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${ELECTION_PORT:-3002}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${ELECTION_PORT:-3002}:${ELECTION_PORT:-3002}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${ELECTION_PORT:-3002}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  vote-service:
    build:
      context: ./backend
      dockerfile: vote-service/Dockerfile
    container_name: voting-vote
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${VOTE_PORT:-3003}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${VOTE_PORT:-3003}:${VOTE_PORT:-3003}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${VOTE_PORT:-3003}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voting-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      auth-service:
        condition: service_healthy
      election-service:
        condition: service_healthy
      vote-service:
        condition: service_healthy
