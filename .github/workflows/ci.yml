name: CI — Build, Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust backend tests ────────────────────────────────────────────────────
  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_voting_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend/auth-service"

      - name: Check formatting
        working-directory: backend/auth-service
        run: cargo fmt --check

      - name: Run Clippy (deny warnings)
        working-directory: backend/auth-service
        run: cargo clippy -- -D warnings
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/test_voting_db
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long

      - name: Run tests
        working-directory: backend/auth-service
        run: cargo test --all-features
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/test_voting_db
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long

  test-election-service:
    name: Test Election Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_voting_db
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend/election-service"
      - name: Format check
        working-directory: backend/election-service
        run: cargo fmt --check
      - name: Clippy
        working-directory: backend/election-service
        run: cargo clippy -- -D warnings
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/test_voting_db
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long
      - name: Tests
        working-directory: backend/election-service
        run: cargo test
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/test_voting_db
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long

  test-vote-service:
    name: Test Vote Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_voting_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "backend/vote-service"
      - name: Format check
        working-directory: backend/vote-service
        run: cargo fmt --check
      - name: Clippy
        working-directory: backend/vote-service
        run: cargo clippy -- -D warnings
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/test_voting_db
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long
      - name: Tests
        working-directory: backend/vote-service
        run: cargo test
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/test_voting_db
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test_jwt_secret_at_least_32_chars_long

  # ── Angular frontend ──────────────────────────────────────────────────────
  test-frontend:
    name: Test Angular Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint || true
      - name: Build (production)
        working-directory: frontend
        run: npm run build:prod
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── K8s manifest validation ───────────────────────────────────────────────
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/
      - name: Validate manifests
        run: |
          find k8s -name "*.yaml" | xargs kubeval --strict --ignore-missing-schemas
