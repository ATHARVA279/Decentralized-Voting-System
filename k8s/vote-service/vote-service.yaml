---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service
  namespace: voting-system
  labels:
    app: vote-service
    tier: backend
spec:
  replicas: 3         # Higher baseline — vote service is the hot path
  selector:
    matchLabels:
      app: vote-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vote-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3003"
    spec:
      terminationGracePeriodSeconds: 60   # Longer — allow WS connections to drain
      containers:
        - name: vote-service
          image: voting/vote-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: PORT
              value: "3003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RUST_LOG
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
  namespace: voting-system
spec:
  selector:
    app: vote-service
  ports:
    - port: 3003
      targetPort: 3003
      name: http
  type: ClusterIP

---
# Vote service scales aggressively on election day
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vote-service-hpa
  namespace: voting-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vote-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # Scale up fast on election day
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # Scale down slowly (5 min) to avoid flapping
