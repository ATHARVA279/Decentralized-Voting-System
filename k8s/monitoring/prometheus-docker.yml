# Prometheus config for Docker Compose (uses service names as hostnames)
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/metrics'

  - job_name: 'election-service'
    static_configs:
      - targets: ['election-service:3002']
    metrics_path: '/metrics'

  - job_name: 'vote-service'
    static_configs:
      - targets: ['vote-service:3003']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
